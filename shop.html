<script>
let db = []; 
let filtered = []; 
let currentIndex = 0;
let exchangeRate = 0; // Итоговый курс (ЦБ + надбавка)

const parseNum = (s) => parseFloat(String(s).replace(',', '.')) || 0;

// Функция получения курса ЦБ
async function fetchExchangeRate() {
    try {
        // Используем открытое API для получения курса USD
        const response = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await response.json();
        const rateRUB = data.rates.RUB;
        
        // Складываем курс и твою надбавку из config.js
        exchangeRate = rateRUB + (DIAMOND_CONFIG.rateAdd || 0);
        console.log(`Курс ЦБ: ${rateRUB}, С надбавкой: ${exchangeRate}`);
    } catch (e) {
        console.error("Не удалось получить курс, ставим резервный 100", e);
        exchangeRate = 100 + (DIAMOND_CONFIG.rateAdd || 0);
    }
}

async function init() {
    // Сначала получаем курс
    await fetchExchangeRate();

    const shapeSelect = document.getElementById('f-shape');
    Object.entries(DIAMOND_CONFIG.s).forEach(([code, name]) => {
        shapeSelect.innerHTML += `<option value="${code}">${name}</option>`;
    });

    try {
        const response = await fetch('diamonds_lab.csv');
        const text = await response.text();
        const lines = text.split('\n');
        
        db = lines.slice(1).map(line => {
            const v = line.split(';');
            if (v.length < 12) return null;
            
            const priceUSD = parseNum(v[12]);
            // Считаем цену в рублях
            const priceRUB = Math.ceil(priceUSD * exchangeRate);

            return {
                re: v[0],
                lab: v[1],
                shape: v[2],
                ct: parseNum(v[3]),
                col: v[4],
                cla: v[5],
                cut: v[6],
                price: priceRUB // Храним уже в рублях
            };
        }).filter(i => i && i.re);

        filtered = [...db];
        updateStats();
        renderNextPage(true);
    } catch (e) { 
        console.error(e);
    }
}

function updateStats() {
    const statsText = `Курс: ${exchangeRate.toFixed(2)} ₽ | Всего: ${db.length}`;
    document.getElementById('stats').innerText = statsText;
}

function renderNextPage(reset = false) {
    const container = document.getElementById('catalog');
    if (reset) { container.innerHTML = ''; currentIndex = 0; }

    const chunk = filtered.slice(currentIndex, currentIndex + DIAMOND_CONFIG.pageItems);
    chunk.forEach(i => {
        const shapeName = DIAMOND_CONFIG.s[i.shape] || i.shape;
        container.innerHTML += `
            <div class="diamond-card">
                <div class="card-head flex-between">
                    <span class="report">${i.lab} ${i.re}</span>
                    <span class="price-tag text-white font-bold">${i.price.toLocaleString()} ₽</span>
                </div>
                <div class="card-body py-6 text-center">
                    <div class="ct-val text-3xl text-white font-light">${i.ct} <span class="text-xs text-stone-500 uppercase">ct</span></div>
                    <div class="shape-val serif text-xl italic text-stone-400 mt-1">${shapeName}</div>
                </div>
                <div class="card-footer">
                    <p class="specs-text text-center text-[10px] uppercase tracking-widest text-stone-500 mb-4">
                        ${i.col} / ${i.cla} • ${i.cut}
                    </p>
                    <button onclick="openContactModal('${i.re}')" class="btn-card-action">Запросить цену</button>
                </div>
            </div>`;
    });
    
    currentIndex += chunk.length;
    const btnLoad = document.getElementById('load-more');
    btnLoad.style.display = currentIndex >= filtered.length ? 'none' : 'block';
}

// Фильтры теперь тоже работают по рублевой цене
function applyFilters() {
    const s = document.getElementById('f-shape').value;
    const minW = parseNum(document.getElementById('f-min-w').value);
    const maxW = parseNum(document.getElementById('f-max-w').value) || 999;
    const maxP = parseNum(document.getElementById('f-max-p').value) || 999999999;

    filtered = db.filter(i => 
        (!s || i.shape === s) && 
        (i.ct >= minW && i.ct <= maxW) && 
        (i.price <= maxP)
    );
    
    renderNextPage(true);
}
</script>

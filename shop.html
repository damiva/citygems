<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGems — Эксклюзивный каталог</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --bg: #080808; --card: #0c0c0c; --border: #1a1a1a; --text: #d1d5db; --text-main: #ffffff; --accent: #D4AF37;
        }
        body.light {
            --bg: #F9F8F6; --card: #ffffff; --border: #e5e7eb; --text: #4b5563; --text-main: #111827; --accent: #b49431;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); transition: background 0.3s ease; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .diamond-card { background: var(--card); border: 1px solid var(--border); transition: all 0.3s ease; }
        .diamond-card:hover { border-color: var(--accent); }
        select, input { background: var(--card) !important; border: 1px solid var(--border) !important; color: var(--text-main) !important; border-radius: 0 !important; outline: none; }
        
        /* Слайдеры */
        .range-slider { position: relative; width: 100%; height: 30px; margin-bottom: 5px; }
        .range-slider input[type="range"] {
            position: absolute; width: 100%; pointer-events: none; appearance: none; -webkit-appearance: none; 
            z-index: 2; height: 10px; opacity: 0; background: none; top: 10px;
        }
        .range-slider input[type="range"]::-webkit-slider-thumb {
            pointer-events: all; width: 24px; height: 24px; -webkit-appearance: none; cursor: pointer;
        }
        .slider-track { position: absolute; width: 100%; height: 1px; background: var(--border); top: 20px; z-index: 1; }
        .slider-thumb-custom {
            position: absolute; width: 10px; height: 10px; background: var(--accent); top: 20px; 
            transform: translate(-50%, -50%); z-index: 3; pointer-events: none; border-radius: 50%;
        }

        .active-view { color: var(--accent) !important; }
        .view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .view-list { display: flex; flex-direction: column; gap: 1rem; }
        
        /* Улучшенные стили для карточек */
        .spec-badge { display: inline-block; padding: 0.25rem 0.75rem; font-size: 7px; background: var(--border); border-radius: 3px; color: var(--text-main); margin-right: 0.5rem; margin-bottom: 0.25rem; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body class="min-h-screen">

<header class="border-b border-stone-900/10 sticky top-0 bg-opacity-95 backdrop-blur-md z-50 shadow-sm" style="background-color: var(--bg); border-color: var(--border);">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex-1">
            <h1 class="text-xl tracking-[0.3em] font-light uppercase text-main" style="color: var(--text-main)">City<span class="serif italic opacity-50 lowercase">Gems</span></h1>
        </div>
        
        <div class="hidden md:block">
            <button onclick="openContactModal()" class="text-[9px] border border-stone-800 px-8 py-2 hover:bg-stone-800 hover:text-white transition-all uppercase tracking-widest" style="color: var(--text-main); border-color: var(--border);">
                Связаться с нами
            </button>
        </div>
        
        <div class="flex-1 flex justify-end items-center gap-6">
            <button onclick="toggleTheme()" class="text-[9px] uppercase tracking-widest opacity-60 hover:opacity-100">
                <span id="theme-icon">Тёмная</span>
            </button>

            <select id="sort-order" onchange="applyFiltersAndSort()" class="text-[9px] uppercase bg-transparent border-none outline-none tracking-widest cursor-pointer">
                <option value="new">По умолчанию</option>
                <option value="p-asc">Цена: Минимум</option>
                <option value="p-desc">Цена: Максимум</option>
                <option value="w-asc">Вес: Минимум</option>
                <option value="w-desc">Вес: Максимум</option>
            </select>

            <div class="flex gap-4 border-l border-stone-800 pl-6" style="border-color: var(--border);">
                <button id="btn-list" onclick="changeView('list')" class="text-stone-500 hover:text-stone-300">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
                </button>
                <button id="btn-grid" onclick="changeView('grid')" class="text-stone-500 hover:text-stone-300">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zM2.5 2a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zm6.5.5A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zM1 10.5A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zm6.5.5A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3z"/></svg>
                </button>
            </div>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto flex flex-col lg:flex-row">
    <aside class="w-full lg:w-72 p-8 border-r bg-opacity-50" style="border-color: var(--border);">
        <div class="sticky-sidebar">
            <h2 class="serif text-3xl text-main italic mb-8" style="color: var(--text-main)">Фильтры</h2>
            
            <div class="space-y-10">
                <div>
                    <label class="text-[8px] uppercase tracking-[0.3em] opacity-50 mb-3 block">Огранка</label>
                    <select id="f-shape" onchange="applyFiltersAndSort()" class="w-full p-3 text-[10px] uppercase"></select>
                </div>

                <div>
                    <label class="text-[8px] uppercase tracking-[0.3em] opacity-50 mb-2 block">Вес (ct)</label>
                    <div class="range-slider">
                        <div class="slider-track"></div>
                        <input type="range" id="r-min-w" step="0.01" oninput="sync('w', 'min')">
                        <input type="range" id="r-max-w" step="0.01" oninput="sync('w', 'max')">
                        <div id="thumb-min-w" class="slider-thumb-custom"></div>
                        <div id="thumb-max-w" class="slider-thumb-custom"></div>
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="f-min-w" step="0.01" oninput="syncInputs('w')" class="w-1/2 p-2 text-[10px] text-center" placeholder="От">
                        <input type="number" id="f-max-w" step="0.01" oninput="syncInputs('w')" class="w-1/2 p-2 text-[10px] text-center" placeholder="До">
                    </div>
                </div>

                <div>
                    <label class="text-[8px] uppercase tracking-[0.3em] opacity-50 mb-2 block">Цена (₽)</label>
                    <div class="range-slider">
                        <div class="slider-track"></div>
                        <input type="range" id="r-min-p" step="1000" oninput="sync('p', 'min')">
                        <input type="range" id="r-max-p" step="1000" oninput="sync('p', 'max')">
                        <div id="thumb-min-p" class="slider-thumb-custom"></div>
                        <div id="thumb-max-p" class="slider-thumb-custom"></div>
                    </div>
                    <div class="space-y-2">
                        <input type="number" id="f-min-p" oninput="syncInputs('p')" class="w-full p-2 text-[10px]" placeholder="От">
                        <input type="number" id="f-max-p" oninput="syncInputs('p')" class="w-full p-2 text-[10px]" placeholder="До">
                    </div>
                </div>
            </div>

            <div id="stats-counter" class="mt-10 pt-6 border-t text-[9px] uppercase tracking-[0.2em] opacity-50 text-right italic" style="border-color: var(--border);">Загрузка...</div>
        </div>
    </aside>

    <main class="flex-1 p-6">
        <div id="catalog" class="view-list"></div>
        <div class="mt-12 flex justify-center pb-20">
            <button id="load-more" onclick="renderNextPage()" class="hidden border px-16 py-4 text-[9px] uppercase tracking-[0.3em] opacity-60 hover:opacity-100 hover:border-white transition-all" style="border-color: var(--border); color: var(--text-main);">Показать еще</button>
        </div>
    </main>
</div>

<!-- Contact Modal -->
<div id="contact-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="bg-stone-900 border border-stone-700 p-8 max-w-md w-full" style="background-color: var(--card); border-color: var(--border);">
        <h2 class="serif text-2xl italic mb-4" style="color: var(--text-main);">Запросить камень</h2>
        <form id="contact-form" onsubmit="submitContact(event)">
            <input type="hidden" id="modal-diamond-id">
            <div class="space-y-3 mb-6">
                <input type="text" placeholder="Ваше имя" class="w-full p-2 text-sm" id="contact-name" required>
                <input type="email" placeholder="E-mail" class="w-full p-2 text-sm" id="contact-email" required>
                <input type="tel" placeholder="Телефон" class="w-full p-2 text-sm" id="contact-phone" required>
                <textarea placeholder="Сообщение" class="w-full p-2 text-sm h-20" id="contact-message" required></textarea>
            </div>
            <div class="flex gap-4">
                <button type="submit" class="flex-1 py-2 bg-white text-black text-[9px] uppercase font-medium tracking-widest hover:bg-gray-200">Отправить</button>
                <button type="button" onclick="closeContactModal()" class="flex-1 py-2 border border-stone-600 text-[9px] uppercase tracking-widest" style="border-color: var(--border); color: var(--text-main);">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
let db = [], filtered = [], currentIndex = 0, exchangeRate = 105, currentView = 'list';
const parseNum = (s) => parseFloat(String(s || '').replace(',', '.')) || 0;

// Темы
function toggleTheme() {
    document.body.classList.toggle('light');
    const isLight = document.body.classList.contains('light');
    document.getElementById('theme-icon').innerText = isLight ? 'Светлая' : 'Тёмная';
}

// Управление наложением ползунков (мышка)
function sync(type, side) {
    const min = document.getElementById(`r-min-${type}`);
    const max = document.getElementById(`r-max-${type}`);
    const fMin = document.getElementById(`f-min-${type}`);
    const fMax = document.getElementById(`f-max-${type}`);

    // Логика: ползунки не должны пересекаться
    if (side === 'min' && parseNum(min.value) >= parseNum(max.value)) min.value = max.value;
    if (side === 'max' && parseNum(max.value) <= parseNum(min.value)) max.value = min.value;

    fMin.value = min.value;
    fMax.value = max.value;
    
    // Поднимаем активный ползунок выше по z-index
    min.style.zIndex = (side === 'min') ? "10" : "5";
    max.style.zIndex = (side === 'max') ? "10" : "5";

    updateThumbs(type);
    applyFiltersAndSort();
}

function updateThumbs(type) {
    ['min', 'max'].forEach(side => {
        const input = document.getElementById(`r-${side}-${type}`);
        const thumb = document.getElementById(`thumb-${side}-${type}`);
        const percent = ((input.value - input.min) / (input.max - input.min)) * 100;
        thumb.style.left = percent + '%';
    });
}

function syncInputs(type) {
    const fMin = document.getElementById(`f-min-${type}`);
    const fMax = document.getElementById(`f-max-${type}`);
    document.getElementById(`r-min-${type}`).value = fMin.value;
    document.getElementById(`r-max-${type}`).value = fMax.value;
    updateThumbs(type);
    applyFiltersAndSort();
}

async function init() {
    changeView('list');
    try {
        const shapeSelect = document.getElementById('f-shape');
        shapeSelect.innerHTML = '<option value="">Все огранки</option>';
        Object.entries(DIAMOND_CONFIG.s).forEach(([code, name]) => shapeSelect.innerHTML += `<option value="${code}">${name}</option>`);

        // Кэш валюты на 24 часа
        const cachedRate = localStorage.getItem('exchangeRate');
        const lastRateTime = localStorage.getItem('lastRateTime');
        const now = Date.now();
        if (cachedRate && lastRateTime && (now - lastRateTime < 86400000)) {
            exchangeRate = parseFloat(cachedRate);
        } else {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                exchangeRate = data.rates.RUB + (DIAMOND_CONFIG.r || 0);
                localStorage.setItem('exchangeRate', exchangeRate);
                localStorage.setItem('lastRateTime', now);
            } catch(e) {
                console.warn('Не удалось загрузить валюту, используется кэшированное значение');
            }
        }

        const response = await fetch('diamonds_lab.csv?v=' + Date.now());
        if (!response.ok) throw new Error('CSV не найден');
        const text = await response.text();
        
        db = text.split('\n').slice(1).map(line => {
            const v = line.split(';');
            if (v.length < 13) return null;
            return {
                re: v[0], lab: v[1], shape: v[2], ct: v[3].replace(',', '.'), 
                col: v[4], cla: v[5], cut: v[6], pol: v[7], sym: v[8],
                s1: v[9], s2: v[10], s3: v[11],
                price: Math.ceil(parseNum(v[12]) * exchangeRate)
            };
        }).filter(i => i);

        if (db.length === 0) throw new Error('Каталог пуст');

        const weights = db.map(i => parseNum(i.ct));
        const prices = db.map(i => i.price);
        
        const setR = (id, min, max) => {
            const rMin = document.getElementById(`r-min-${id}`), rMax = document.getElementById(`r-max-${id}`);
            const fMin = document.getElementById(`f-min-${id}`), fMax = document.getElementById(`f-max-${id}`);
            rMin.min = rMax.min = min; rMin.max = rMax.max = max;
            rMin.value = min; rMax.value = max;
            fMin.value = min; fMax.value = max;
            updateThumbs(id);
        };

        setR('w', Math.min(...weights), Math.max(...weights));
        setR('p', Math.min(...prices), Math.max(...prices));

        applyFiltersAndSort();
    } catch(error) {
        console.error('Ошибка инициализации:', error);
        document.getElementById('catalog').innerHTML = `<div class="text-center py-20" style="color: var(--text-main);"><p>⚠️ Ошибка загрузки</p><p class="text-xs opacity-60 mt-2">Проверьте наличие config.js и diamonds_lab.csv</p></div>`;
    }
}

function applyFiltersAndSort() {
    const s = document.getElementById('f-shape').value;
    const minW = parseNum(document.getElementById('f-min-w').value), maxW = parseNum(document.getElementById('f-max-w').value);
    const minP = parseNum(document.getElementById('f-min-p').value), maxP = parseNum(document.getElementById('f-max-p').value);
    const sort = document.getElementById('sort-order').value;

    filtered = db.filter(i => 
        (!s || i.shape === s) && 
        (parseNum(i.ct) >= minW && parseNum(i.ct) <= maxW) && 
        (i.price >= minP && i.price <= maxP)
    );

    if (sort === 'p-asc') filtered.sort((a,b) => a.price - b.price);
    else if (sort === 'p-desc') filtered.sort((a,b) => b.price - a.price);
    else if (sort === 'w-asc') filtered.sort((a,b) => parseNum(a.ct) - parseNum(b.ct));
    else if (sort === 'w-desc') filtered.sort((a,b) => parseNum(b.ct) - parseNum(a.ct));

    const total = db.length.toLocaleString('ru-RU');
    const found = filtered.length.toLocaleString('ru-RU');
    document.getElementById('stats-counter').innerHTML = filtered.length === db.length ? `ВСЕГО: ${total}` : `НАЙДЕНО: <span style="color:var(--text-main)">${found}</span> <span style="opacity:0.4">ИЗ ${total}</span>`;
    
    renderNextPage(true);
}

function changeView(v) {
    currentView = v;
    document.getElementById('catalog').className = v === 'grid' ? 'view-grid' : 'view-list';
    document.getElementById('btn-list').classList.toggle('active-view', v === 'list');
    document.getElementById('btn-grid').classList.toggle('active-view', v === 'grid');
    renderNextPage(true);
}

function renderNextPage(reset = false) {
    const container = document.getElementById('catalog');
    if (reset) { container.innerHTML = ''; currentIndex = 0; }
    
    const chunk = filtered.slice(currentIndex, currentIndex + DIAMOND_CONFIG.n);
    const fragment = document.createDocumentFragment();
    
    chunk.forEach(i => {
        const img = `${DIAMOND_CONFIG.i.p}${i.shape}${DIAMOND_CONFIG.i.e}`;
        const name = DIAMOND_CONFIG.s[i.shape] || i.shape;
        const price = i.price.toLocaleString('ru-RU');
        const badge = `<div class="absolute top-2 left-2 bg-black/80 backdrop-blur px-2 py-0.5 text-[7px] text-white font-bold uppercase z-10 border border-white/10">${i.lab}</div>`;

        const div = document.createElement('div');
        div.className = 'diamond-card p-5';
        
        if (currentView === 'list') {
            div.className += ' flex flex-row items-center gap-6';
            div.innerHTML = `
                <div class="w-28 h-28 bg-stone-500/5 relative flex-shrink-0 rounded">
                    ${badge}
                    <video src="${img}" autoplay loop muted playsinline class="w-full h-full object-contain p-2" onerror="this.outerHTML='<div class=\\"flex items-center justify-center h-full text-3xl\\">💎</div>'"></video>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start mb-3 gap-4">
                        <div>
                            <div class="text-sm opacity-60 uppercase tracking-widest mb-1" style="color:var(--text)">ID: <b style="color:var(--text-main)">${i.re}</b></div>
                            <span class="serif italic text-lg" style="color:var(--accent)">${name}</span>
                            <span class="text-2xl font-light ml-3" style="color:var(--text-main)">${i.ct} ct</span>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <div class="text-xs opacity-60 uppercase mb-1">Цена</div>
                            <div class="text-xl font-semibold" style="color:var(--accent)">${price} ₽</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-[10px] uppercase tracking-wider mb-3">
                        <div><span class="opacity-60">Цвет:</span> <b style="color:var(--text-main)">${i.col}</b></div>
                        <div><span class="opacity-60">Чистота:</span> <b style="color:var(--text-main)">${i.cla}</b></div>
                        <div><span class="opacity-60">Огранка:</span> <b style="color:var(--text-main)">${i.cut}</b></div>
                        <div><span class="opacity-60">Полировка:</span> <b style="color:var(--text-main)">${i.pol}</b></div>
                        <div><span class="opacity-60">Симметрия:</span> <b style="color:var(--text-main)">${i.sym}</b></div>
                        <div><span class="opacity-60">Размер:</span> <b style="color:var(--text-main)">${i.s1}×${i.s2}×${i.s3}</b></div>
                    </div>
                </div>
                <button onclick="openContactModal('${i.re}')" class="px-6 py-3 border border-stone-800 text-[9px] uppercase tracking-widest hover:bg-white hover:text-black transition-all flex-shrink-0 rounded" style="border-color:var(--border); color:var(--text-main)">Запрос</button>
            `;
        } else {
            div.className += ' flex flex-col rounded overflow-hidden';
            div.innerHTML = `
                <div class="aspect-square bg-stone-500/5 relative overflow-hidden flex items-center justify-center">
                    ${badge}
                    <video src="${img}" autoplay loop muted playsinline class="w-full h-full object-contain p-4" onerror="this.outerHTML='<div class=\\"text-6xl\\">💎</div>'"></video>
                </div>
                <div class="p-4 flex-1 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="text-[9px] opacity-50 uppercase tracking-widest mb-1">ID ${i.re}</div>
                                <div class="serif italic text-sm mb-1" style="color:var(--accent)">${name}</div>
                                <div class="text-xl font-light" style="color:var(--text-main)">${i.ct} ct</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs opacity-60 uppercase mb-1">Цена</div>
                                <div class="font-semibold" style="color:var(--accent)">${price} ₽</div>
                            </div>
                        </div>
                        <div class="border-t mt-3 pt-3" style="border-color:var(--border)">
                            <div class="grid grid-cols-2 gap-2 text-[8px] uppercase tracking-wider opacity-70">
                                <div><span class="opacity-60">Цвет:</span><br><b style="color:var(--text-main)">${i.col}</b></div>
                                <div><span class="opacity-60">Чистота:</span><br><b style="color:var(--text-main)">${i.cla}</b></div>
                                <div><span class="opacity-60">Огранка:</span><br><b style="color:var(--text-main)">${i.cut}</b></div>
                                <div><span class="opacity-60">Полировка:</span><br><b style="color:var(--text-main)">${i.pol}</b></div>
                                <div class="col-span-2"><span class="opacity-60">Симметрия:</span> <b style="color:var(--text-main)">${i.sym}</b></div>
                                <div class="col-span-2"><span class="opacity-60">Размеры:</span> <b style="color:var(--text-main)">${i.s1}×${i.s2}×${i.s3} мм</b></div>
                            </div>
                        </div>
                    </div>
                    <button onclick="openContactModal('${i.re}')" class="mt-4 w-full py-3 border border-stone-800 text-[9px] uppercase tracking-widest hover:bg-white hover:text-black transition-all rounded" style="border-color:var(--border); color:var(--text-main)">Запросить</button>
                </div>
            `;
        }
        fragment.appendChild(div);
    });
    container.appendChild(fragment);
    currentIndex += chunk.length;
    document.getElementById('load-more').style.display = (currentIndex >= filtered.length) ? 'none' : 'block';
}

function openContactModal(id) {
    document.getElementById('modal-diamond-id').value = id || '';
    document.getElementById('contact-modal').classList.remove('hidden');
}

function closeContactModal() {
    document.getElementById('contact-modal').classList.add('hidden');
    document.getElementById('contact-form').reset();
}

function submitContact(e) {
    e.preventDefault();
    const diamondId = document.getElementById('modal-diamond-id').value;
    const name = document.getElementById('contact-name').value;
    const email = document.getElementById('contact-email').value;
    const phone = document.getElementById('contact-phone').value;
    const message = document.getElementById('contact-message').value;
    
    // TODO: Отправить на сервер (email, API и т.д.)
    console.log('Запрос:', { diamondId, name, email, phone, message });
    alert('✓ Спасибо! Мы свяжемся с вами в ближайшее время.');
    closeContactModal();
}

init();
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGems — Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="min-h-screen light-theme">

<header class="header-main">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="logo">
            City<span class="serif italic lowercase opacity-60">Gems</span>
        </div>

        <div class="header-controls">
            <button onclick="toggleTheme()" class="theme-toggle">
                <span id="theme-label">Светлая тема</span>
            </button>

            <select id="sort-order" onchange="applyFilters()" class="sort-select">
                <option value="none">Сортировка</option>
                <option value="p-asc">Цена ↑</option>
                <option value="p-desc">Цена ↓</option>
                <option value="w-asc">Вес ↑</option>
                <option value="w-desc">Вес ↓</option>
            </select>

            <div class="view-switch">
                <button id="v-list" onclick="setView('list')" class="active-btn"><svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg></button>
                <button id="v-grid" onclick="setView('grid')"><svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M1 1h6v6H1V1zm1 1v4h4V2H2zM9 1h6v6H9V1zm1 1v4h4V2h-4zM1 9h6v6H1V9zm1 1v4h4v-4H2zM9 9h6v6H9V9zm1 1v4h4v-4h-4z"/></svg></button>
            </div>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto flex flex-col lg:flex-row">
    <aside class="sidebar">
        <div class="sticky top-24">
            <h2 class="serif filters-title">Фильтры</h2>
            
            <div class="space-y-10">
                <div>
                    <label class="filter-label">Форма огранки</label>
                    <select id="f-shape" onchange="applyFilters()" class="custom-select"></select>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">Вес (Carat)</label>
                        <span id="val-w" class="current-val"></span>
                    </div>
                    <div class="range-container">
                        <div class="slider-track"></div>
                        <input type="range" id="r-min-w" step="0.01" oninput="syncRange('w', 'min')">
                        <input type="range" id="r-max-w" step="0.01" oninput="syncRange('w', 'max')">
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <input type="number" id="i-min-w" step="0.01" oninput="syncInput('w')" class="input-mini">
                        <input type="number" id="i-max-w" step="0.01" oninput="syncInput('w')" class="input-mini">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">Цена (₽)</label>
                        <span id="val-p" class="current-val"></span>
                    </div>
                    <div class="range-container">
                        <div class="slider-track"></div>
                        <input type="range" id="r-min-p" step="1000" oninput="syncRange('p', 'min')">
                        <input type="range" id="r-max-p" step="1000" oninput="syncRange('p', 'max')">
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <input type="number" id="i-min-p" oninput="syncInput('p')" class="input-mini" placeholder="От">
                        <input type="number" id="i-max-p" oninput="syncInput('p')" class="input-mini" placeholder="До">
                    </div>
                </div>
            </div>

            <div id="counter" class="results-counter">Загрузка...</div>
        </div>
    </aside>

    <main class="content-area">
        <div id="catalog" class="view-list"></div>
        <div id="more-box" class="load-more-container hidden">
            <button onclick="renderNextPage()" class="load-more-btn">Показать еще</button>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>

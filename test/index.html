<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="https://cutygems.ru">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityGems — лабораторные бриллианты</title>
  <link href="index.css" rel="stylesheet"> 
  <style>.hidden{display: none !important}</style>
  <script src="js/gems.js"></script>
  <script src="js/index.js"></script>
</head>
<body>
    <header>
        <a href="#about" title="О нас"><img src="cgb.png" alt="О нас"></a>
        <a href="#catalog">Каталог</a>
        <a href="#order">Корзина</a> </header>
    <main>
        <section id="about">
            <h1>Камни, которые рассказывают историю</h1>
            <p>Тестовый текст...</p>
        </section>
        <section id="catalog" class="hidden">
            <h1>
                Наш каталог
                <span id="catalog-count">0</span>
                <select id="catalog-sort">
                    <option>↑ Цена</option>
                    <option>↓ Цена</option>
                    <option>↑ Вес</option>
                    <option>↓ Вес</option>
                </select>
            </h1>
            <aside id="catalog-filter">
                <h2>Фильтры <button>сбросить</button></h2>
                <h1>Вес: <button>сбросить</button></h1>
                <h1>Форма: <button>сбросить</button></h1>
                <h1>Цвет: <button>сбросить</button></h1>
                <h1>Чистота: <button>сбросить</button></h1>
                <h1>Сертификат: <button>сбросить</button></h1>
                <h1>Цена: <button>сбросить</button></h1>
            </aside>
            <ul id="catalog-list"></ul>
        </section>        
        <section id="order" class="hidden">
            <h1>Ваша корзина</h1>
            <ul id="order-list"></ul>
        </section>
    </main>
    
    <template id="catalog-card"><li class="catalog-card"></li></template>
    <template id="order-card"><li class="order-card"></li></template>
    <template id="filter-range">
        <label></label><button>сбросить</button>
        
    </template>
    <template id="filter-set">

    </template>
    <dialog id="info-card"></dialog>
    <dialog id="question">
        <h2></h2>
        <p></p>
        <div class="buttons">
            <button type="submit">Подтвердить</button>
            <button type="button" onclick="this.closest('dialog').close()">Отменить</button>
        </div>
    </dialog>

    <script>
        const sectionRoute = () => {
            const id = ["#catalog", "#order"].includes(location.hash) ? location.hash.slice(1) : "about"; 
            document.querySelectorAll("main > section").forEach(s => { 
                s.classList.toggle("hidden", s.id !== id); 
            });
        };
        window.addEventListener("hashchange", sectionRoute);
        window.gemsPromise.then(d => {
            if (typeof initGems == "function") initGems(d);
            if (typeof initCart == "function") initCart(new Cart(d));
            sectionRoute(); 
        }).catch(e => {
            document.getElementById("catalog").innerHTML = `<h1>Ошибка загрузки!</h1><p>${e.message}</p>`;
            sectionRoute();
        });
    </script>
</body>
</html>

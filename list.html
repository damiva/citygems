<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGems — Спецификация заказа</title>
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
            --accent: #b49431;
            --border: #eeeeee;
            --muted: #888;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text); background: var(--bg); line-height: 1.5; margin: 0; padding: 40px 20px; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 40px; }
        h1 { font-family: "Georgia", serif; font-style: italic; font-weight: 300; font-size: 2.5rem; margin: 0; }
        .meta { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-top: 10px; }
        
        .auth-trigger { cursor: pointer; opacity: 0.2; transition: opacity 0.3s; }
        .auth-trigger:hover { opacity: 1; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; color: var(--muted); padding: 15px 10px; border-bottom: 2px solid var(--text); }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); }
        
        .re { font-weight: 600; }
        .sh { font-size: 11px; color: var(--muted); }
        .eco { color: var(--accent); background: #fafafa; font-size: 12px; }
        .price { font-weight: 600; text-align: right; white-space: nowrap; }
        
        .total-section { margin-top: 40px; text-align: right; }
        .total-label { font-size: 11px; text-transform: uppercase; color: var(--muted); }
        .total-val { font-family: "Georgia", serif; font-style: italic; font-size: 3rem; color: var(--text); }

        @media (max-width: 600px) {
            .hide-mobile { display: none; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Спецификация</h1>
            <div id="order-meta" class="meta">Загрузка данных...</div>
        </div>
        <div class="auth-trigger" onclick="doLogin()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 15V17M12 7V11M20 12C20 16.4183 16.4183 20 12 20C7.58172 20 4 16.4183 4 12C4 7.58172 7.58172 4 12 4C16.4183 4 20 7.58172 20 12Z" stroke-linecap="round"/></svg>
        </div>
    </header>

    <div id="content">
        <table id="main-table">
            <thead>
                <tr id="table-head">
                    </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="total-section">
        <div class="total-label">Итого к оплате</div>
        <div id="total-val" class="total-val">0 ₽</div>
    </div>
</div>

<script type="module">
    import { City } from './city.js';
    import { Gems } from './data/gems.js';

    const STORAGE_KEY = '_cg_config_cache';

    // 1. Крипто-функция (SHA-256 -> Base36)
    async function getHash(str) {
        const msgBuffer = new TextEncoder().encode(str);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const bigInt = BigInt('0x' + hashArray.map(b => b.toString(16).padStart(2, '0')).join(''));
        return bigInt.toString(36).slice(0, 12);
    }

    // 2. Проверка авторизации (теперь хэшируем пароль из памяти)
    async function checkIra() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
            const h = await getHash(raw);
            const res = await fetch(`./data/${h}.db`);
            return res.ok;
        } catch (e) { return false; }
    }

    window.doLogin = () => {
        const p = prompt("Ключ доступа:");
        if (p) {
            localStorage.setItem(STORAGE_KEY, p);
            location.reload();
        }
    };

    // 3. Основная логика рендера
    async function init() {
        const token = window.location.search.substring(1);
        const data = City.parseLink(token);
        if (!data) {
            document.getElementById('order-meta').innerText = "Ошибка: неверная ссылка";
            return;
        }

        const isIra = await checkIra();
        const curRate = await City.updateRate(); // Получаем свежий курс ЦБ
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        
        document.getElementById('order-meta').innerText = `Курс фиксации: ${data.meta.rate} ₽ | Каталог: ${new Date(data.meta.dsGems * 86400000).toLocaleDateString()}`;

        // Формируем шапку
        let headHtml = `<th>Артикул</th><th>Параметры</th><th class="hide-mobile">Вес</th>`;
        if (isIra) headHtml += `<th class="eco">USD</th><th class="eco">Курс Фикс.</th><th class="eco">Курс Текущ.</th>`;
        headHtml += `<th style="text-align:right">Цена (RUB)</th>`;
        head.innerHTML = headHtml;

        let total = 0;

        data.items.forEach(item => {
            const g = Gems.db.find(x => x.re === item.re);
            if (!g) return;

            const clientPrice = Math.round(g.usd * data.meta.rate);
            const currentPrice = Math.round(g.usd * (curRate + City.add));
            total += (clientPrice * item.qty);

            let row = `<tr>
                <td><div class="re">#${g.re}</div><div class="sh">${Gems.shapes[g.sh]?.ru || g.sh}</div></td>
                <td><div style="font-size:11px; opacity:0.7">${g.col}/${g.cla} ${g.cut}</div></td>
                <td class="hide-mobile">${g.ct} ct</td>`;
            
            if (isIra) {
                row += `
                <td class="eco">$${g.usd}</td>
                <td class="eco">${data.meta.rate}</td>
                <td class="eco">${(curRate + City.add).toFixed(2)}</td>`;
            }

            row += `<td class="price">${(clientPrice * item.qty).toLocaleString()} ₽</td></tr>`;
            body.insertAdjacentHTML('beforeend', row);
        });

        document.getElementById('total-val').innerText = total.toLocaleString() + ' ₽';
    }

    init();
</script>
</body>
</html>

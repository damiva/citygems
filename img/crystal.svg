<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#C5A880" stroke-width="0.5">
  <style>
    .spinning-group {
      animation: spin-slow 120s linear infinite;
      transform-origin: 50px 50px;
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  <g class="spinning-group">
    <circle cx="50" cy="50" r="48" stroke-dasharray="2 4" />
    <polygon points="50,5 95,35 78,85 22,85 5,35" />
    <polygon points="50,95 95,35 78,85 22,85 5,35" />
    <line x1="50" y1="5" x2="50" y2="95" />
    <line x1="5" y1="35" x2="95" y2="35" />
    <line x1="22" y1="85" x2="78" y2="85" />
    <polygon points="50,25 75,45 65,75 35,75 25,45" />
    <line x1="50" y1="5" x2="50" y2="25" />
    <line x1="5" y1="35" x2="25" y2="45" />
    <line x1="95" y1="35" x2="75" y2="45" />
    <line x1="22" y1="85" x2="35" y2="75" />
    <line x1="78" y1="85" x2="65" y2="75" />
  </g>
</svg>
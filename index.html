<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGems — Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="min-h-screen light-theme">

<header class="header-main">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="logo">CITY<span>gems</span></div>

        <div class="header-controls">
            <button onclick="openWishlist()" class="wishlist-btn-main">
                <span>Избранное</span>
                <span id="wish-count" class="wish-badge">0</span>
            </button>
            <button onclick="toggleTheme()" class="theme-toggle">
                <span id="theme-label">Светлая тема</span>
            </button>

            <select id="sort-order" onchange="applyFilters()" class="sort-select">
                <option value="none">Сортировка</option>
                <option value="p-asc">Цена ↑</option>
                <option value="p-desc">Цена ↓</option>
                <option value="w-asc">Вес ↑</option>
                <option value="w-desc">Вес ↓</option>
            </select>

            <div class="view-switch">
                <button id="v-list" onclick="setView('list')" class="active-btn"><svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg></button>
                <button id="v-grid" onclick="setView('grid')"><svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M1 1h6v6H1V1zm1 1v4h4V2H2zM9 1h6v6H9V1zm1 1v4h4V2h-4zM1 9h6v6H1V9zm1 1v4h4v-4H2zM9 9h6v6H9V9zm1 1v4h4v-4h-4z"/></svg></button>
            </div>
        </div>
    </div>
</header>

<section id="page-home" class="content-section">
    <div class="max-w-4xl mx-auto py-20 px-6 prose-content" id="home-content"></div>
</section>

<section id="page-catalog" class="content-section hidden">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row">
        <aside class="sidebar">
            <div class="sticky top-24">
                
                <div class="mb-10 space-y-6 pb-6 border-b" style="border-color: var(--border)">
                    <div>
                        <label class="filter-label">Отображение</label>
                        <div class="view-switch mt-3 flex gap-4">
                            <button id="v-list" onclick="setView('list')" class="active-btn hover:text-[var(--accent)] transition-colors"><svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg></button>
                            <button id="v-grid" onclick="setView('grid')" class="hover:text-[var(--accent)] transition-colors"><svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M1 1h6v6H1V1zm1 1v4h4V2H2zM9 1h6v6H9V1zm1 1v4h4V2h-4zM1 9h6v6H1V9zm1 1v4h4v-4H2zM9 9h6v6H9V9zm1 1v4h4v-4h-4z"/></svg></button>
                        </div>
                    </div>
                    <div>
                        <label class="filter-label">Сортировка</label>
                        <select id="sort-order" onchange="applyFilters()" class="custom-select mt-2">
                            <option value="none">По умолчанию</option>
                            <option value="p-asc">Цена ↑</option>
                            <option value="p-desc">Цена ↓</option>
                            <option value="w-asc">Вес ↑</option>
                            <option value="w-desc">Вес ↓</option>
                        </select>
                    </div>
                </div>

                <h2 class="serif filters-title">Фильтры</h2>
                
                <div class="space-y-10">
                    <div>
                        <label class="filter-label">Форма огранки</label>
                        <select id="f-shape" onchange="applyFilters()" class="custom-select"></select>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="filter-label">Вес (Carat)</label>
                            <span id="val-w" class="current-val"></span>
                        </div>
                        <div class="range-container">
                            <div class="slider-track"></div>
                            <input type="range" id="r-min-w" step="0.01" oninput="syncRange('w', 'min')">
                            <input type="range" id="r-max-w" step="0.01" oninput="syncRange('w', 'max')">
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <input type="number" id="i-min-w" step="0.01" oninput="syncInput('w')" class="input-mini">
                            <input type="number" id="i-max-w" step="0.01" oninput="syncInput('w')" class="input-mini">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="filter-label">Цена (₽)</label>
                            <span id="val-p" class="current-val"></span>
                        </div>
                        <div class="range-container">
                            <div class="slider-track"></div>
                            <input type="range" id="r-min-p" step="1000" oninput="syncRange('p', 'min')">
                            <input type="range" id="r-max-p" step="1000" oninput="syncRange('p', 'max')">
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <input type="number" id="i-min-p" oninput="syncInput('p')" class="input-mini" placeholder="От">
                            <input type="number" id="i-max-p" oninput="syncInput('p')" class="input-mini" placeholder="До">
                        </div>
                    </div>
                </div>

                <div id="counter" class="results-counter">Загрузка...</div>
            </div>
        </aside>

        <main class="content-area">
            <div id="catalog" class="view-list"></div>
            <div id="more-box" class="load-more-container hidden">
                <button onclick="renderNextPage()" class="load-more-btn flex mx-auto">Показать еще</button>
            </div>
        </main>
    </div>
</section>

<section id="page-contacts" class="content-section hidden">
    <div class="max-w-2xl mx-auto py-20 px-6 prose-content" id="contacts-content"></div>
</section>

<div id="wishlist-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-8 border-b pb-4" style="border-color: var(--border)">
            <h2 class="serif text-3xl italic" style="color:var(--text-main)">Ваш выбор</h2>
            <button onclick="closeWishlist()" class="opacity-50 hover:opacity-100">Закрыть</button>
        </div>
        <div id="wishlist-items" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
            </div>
        <div class="mt-8 pt-6 border-t" style="border-color: var(--border)">
            <div id="wish-total" class="text-right text-xl mb-6" style="color:var(--text-main)"></div>
            <button onclick="sendWishlist()" class="w-full py-4 bg-stone-800 text-white text-[10px] uppercase tracking-[0.4em] hover:bg-black transition-all">
                Запросить подборку
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGems — Каталог</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>

<header class="header">
    <div class="container flex-between">
        <h1 class="logo text-white uppercase font-light">City<span class="serif italic text-stone-500">Gems</span></h1>
        <div id="stats" class="stats text-[10px] uppercase tracking-widest text-stone-600">Загрузка базы...</div>
        <button onclick="openContactModal()" class="btn-sm border border-stone-800 px-4 py-2 hover:bg-stone-200 hover:text-black transition-all">Связь</button>
    </div>
</header>

<div class="main-layout container flex flex-col lg:flex-row">
    <aside class="sidebar w-full lg:w-72 p-6 border-r border-stone-900 space-y-6">
        <h2 class="serif text-2xl text-white italic mb-6">Фильтры</h2>
        <div class="filter-group mb-6">
            <label class="text-[9px] uppercase tracking-[0.3em] mb-3 block">Огранка</label>
            <select id="f-shape" onchange="applyFilters()" class="w-full p-3 text-xs uppercase">
                <option value="">Все формы</option>
            </select>
        </div>
        <div class="filter-group mb-6">
            <label class="text-[9px] uppercase tracking-[0.3em] mb-3 block">Вес (ct)</label>
            <div class="flex gap-2">
                <input type="number" id="f-min-w" step="0.1" placeholder="От" oninput="applyFilters()" class="w-full p-2 text-xs">
                <input type="number" id="f-max-w" step="0.1" placeholder="До" oninput="applyFilters()" class="w-full p-2 text-xs">
            </div>
        </div>
        <div class="filter-group mb-6">
            <label class="text-[9px] uppercase tracking-[0.3em] mb-3 block">Цена до ($)</label>
            <input type="number" id="f-max-p" placeholder="Любая" oninput="applyFilters()" class="w-full p-2 text-xs">
        </div>
    </aside>

    <main class="content flex-1 p-6">
        <div id="catalog" class="catalog-grid grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        <button id="load-more" onclick="renderNextPage()" class="btn-load hidden mx-auto mt-12 px-12 py-4 border border-stone-800 text-[10px] uppercase tracking-widest hover:text-white hover:border-stone-200 transition-all">
            Показать еще
        </button>
    </main>
</div>

<div id="contact-modal" class="modal fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center backdrop-blur-md" onclick="closeModal()">
    <div class="modal-content bg-[#111] p-8 border border-stone-800 max-w-sm w-full text-center" onclick="event.stopPropagation()">
        <h3 id="modal-msg" class="serif italic text-stone-200 mb-8 uppercase text-[10px] tracking-widest text-center">Связаться с нами</h3>
        
        <div id="qr-container" class="hidden">
            <img id="qr-img" src="" class="qr-code mx-auto mb-4 border-8 border-white w-[180px] h-[180px]">
            <p class="hint text-[9px] text-stone-600 uppercase">Наведите камеру телефона</p>
        </div>

        <div id="mobile-ui" class="hidden space-y-4">
            <a id="link-tg" href="#" class="btn-contact block p-4 border border-stone-800 text-[10px] uppercase tracking-widest">Telegram</a>
            <a id="link-wa" href="#" class="btn-contact block p-4 border border-stone-800 text-[10px] uppercase tracking-widest">WhatsApp</a>
        </div>
        
        <button onclick="closeModal()" class="btn-close mt-8 text-[9px] uppercase text-stone-700 tracking-widest">Закрыть</button>
    </div>
</div>

<script>
let db = []; 
let filtered = []; 
let currentIndex = 0;

// Утилита для парсинга чисел (замена запятой на точку)
const parseNum = (s) => parseFloat(String(s).replace(',', '.')) || 0;

async function init() {
    // 1. Заполняем фильтр огранок из DIAMOND_CONFIG.s
    const shapeSelect = document.getElementById('f-shape');
    Object.entries(DIAMOND_CONFIG.s).forEach(([code, name]) => {
        shapeSelect.innerHTML += `<option value="${code}">${name}</option>`;
    });

    try {
        // 2. Загружаем CSV
        const response = await fetch('diamonds_lab.csv');
        const text = await response.text();
        const lines = text.split('\n');
        
        // 3. Парсим CSV вручную (ориентируемся на структуру из файла)
        db = lines.slice(1).map(line => {
            const v = line.split(';');
            if (v.length < 12) return null;
            return {
                re: v[0],    // Номер сертификата
                lab: v[1],   // Лаборатория
                shape: v[2], // Огранка (код)
                ct: parseNum(v[3]), // Каратность
                col: v[4],   // Цвет
                cla: v[5],   // Чистота
                cut: v[6],   // Огранка (качество)
                usd: parseNum(v[12]) // Цена
            };
        }).filter(i => i && i.re);

        filtered = [...db];
        document.getElementById('stats').innerText = `${db.length} камней в наличии`;
        renderNextPage(true);
    } catch (e) { 
        console.error("Ошибка инициализации:", e); 
        document.getElementById('stats').innerText = "Ошибка загрузки данных";
    }
}

function renderNextPage(reset = false) {
    const container = document.getElementById('catalog');
    if (reset) { 
        container.innerHTML = ''; 
        currentIndex = 0; 
    }

    const chunk = filtered.slice(currentIndex, currentIndex + DIAMOND_CONFIG.ipp);
    chunk.forEach(i => {
        // Берем перевод из конфига (DIAMOND_CONFIG.s)
        const shapeName = DIAMOND_CONFIG.s[i.shape] || i.shape;
        container.innerHTML += `
            <div class="diamond-card border border-stone-900 p-6 transition-all hover:border-stone-500 hover:bg-[#141414]">
                <div class="card-head flex justify-between text-[9px] mb-4 uppercase tracking-widest text-stone-600">
                    <span class="report">${i.lab} ${i.re}</span>
                    <span class="price text-white">$${Math.ceil(i.usd).toLocaleString()}</span>
                </div>
                <div class="card-body py-4 text-center">
                    <span class="ct text-white text-2xl font-light">${i.ct}</span> <span class="unit text-[10px] text-stone-500 uppercase">ct</span>
                    <div class="shape text-stone-400 serif italic text-lg mt-1">${shapeName}</div>
                </div>
                <div class="card-footer mt-4">
                    <p class="specs text-[10px] text-center text-stone-500 uppercase tracking-widest mb-6">
                        ${i.col} / ${i.cla} • ${i.cut}
                    </p>
                    <button onclick="openContactModal('${i.re}')" class="btn-card w-full py-2 border border-stone-800 text-[9px] uppercase tracking-[0.2em] hover:bg-white hover:text-black transition-all">Запросить</button>
                </div>
            </div>`;
    });
    
    currentIndex += chunk.length;
    // Кнопка "Показать еще" управляется из конфига (ipp)
    const btnLoad = document.getElementById('load-more');
    btnLoad.classList.toggle('hidden', currentIndex >= filtered.length);
    btnLoad.style.display = currentIndex >= filtered.length ? 'none' : 'block';
}

function applyFilters() {
    const s = document.getElementById('f-shape').value;
    const minW = parseNum(document.getElementById('f-min-w').value);
    const maxW = parseNum(document.getElementById('f-max-w').value) || 999;
    const maxP = parseNum(document.getElementById('f-max-p').value) || 9999999;

    filtered = db.filter(i => 
        (!s || i.shape === s) && 
        (i.ct >= minW && i.ct <= maxW) && 
        (i.usd <= maxP)
    );
    
    document.getElementById('stats').innerText = `Найдено ${filtered.length}`;
    renderNextPage(true);
}

function openContactModal(id = "") {
    const modal = document.getElementById('contact-modal');
    const isMob = /Android|iPhone/i.test(navigator.userAgent);
    
    // Декодируем ник и телефон из твоего конфига (c.t и c.w)
    const tgNick = atob(DIAMOND_CONFIG.c.t);
    const waPhone = atob(DIAMOND_CONFIG.c.w);
    const tgUrl = `https://t.me/${tgNick}`;
    
    modal.classList.remove('hidden');
    if (id) document.getElementById('modal-msg').innerText = `Запрос по камню ${id}`;

    if (isMob) {
        document.getElementById('mobile-ui').classList.remove('hidden');
        document.getElementById('link-tg').href = tgUrl;
        document.getElementById('link-wa').href = `https://wa.me/${waPhone}`;
    } else {
        document.getElementById('qr-container').classList.remove('hidden');
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(tgUrl)}`;
    }
}

function closeModal() {
    const modal = document.getElementById('contact-modal');
    modal.classList.add('hidden');
    document.getElementById('mobile-ui').classList.add('hidden');
    document.getElementById('qr-container').classList.add('hidden');
}

// Запуск приложения
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>citygems — Скоро открытие</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Центрируем всю заглушку ровно по центру экрана */
    body {
      background-color: #FAF9F6; /* Благородный светлый фон */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Идеальный круглый контейнер-медальон */
    .stub-card {
      position: relative;
      width: 100%;
      max-width: 440px; /* Эквивалент max-w-md */
      aspect-ratio: 1 / 1; /* Эквивалент aspect-square */
      background-color: #FFFFFF;
      border: 1px solid #E5E5E0;
      border-radius: 50%; /* Идеальный круг */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px; /* Эквивалент p-8 */
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.02), 0 10px 30px rgba(0, 0, 0, 0.01);
    }

    .diamond-blueprint {
      width: 80%; /* Эквивалент w-4/5 */
      height: 80%; /* Эквивалент h-4/5 */
      color: #C5A880; /* Матовое золото */
      opacity: 0.85; /* Эквивалент opacity-90 */
      animation: spin-slow 120s linear infinite; 
    }

    .stub-text-holder {
      position: absolute;
      text-align: center;
      pointer-events: none;
    }

    .stub-title {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: #1A1A1A;
      white-space: nowrap;
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
    <main class="stub-card">
        <svg class="diamond-blueprint" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="0.5">
            <circle cx="50" cy="50" r="48" stroke-dasharray="2 4" />
            <polygon points="50,5 95,35 78,85 22,85 5,35" />
            <polygon points="50,95 95,35 78,85 22,85 5,35" />
            <line x1="50" y1="5" x2="50" y2="95" />
            <line x1="5" y1="35" x2="95" y2="35" />
            <line x1="22" y1="85" x2="78" y2="85" />
            <polygon points="50,25 75,45 65,75 35,75 25,45" />
            <line x1="50" y1="5" x2="50" y2="25" />
            <line x1="5" y1="35" x2="25" y2="45" />
            <line x1="95" y1="35" x2="75" y2="45" />
            <line x1="22" y1="85" x2="35" y2="75" />
            <line x1="78" y1="85" x2="65" y2="75" />
        </svg>
        <div class="stub-text-holder">
            <h1 class="stub-title">СКОРО ОТКРЫТИЕ</h1>
        </div>
    </main>
</body>
</html>

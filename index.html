<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a8a29e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M6 3h12l4 6-10 12L2 9z'/><path d='M11 3l-4 6 5 12 5-12-4-6'/><path d='M2 9h20'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230d0d0d'/><path d='M25 20h50l15 25-40 45-40-45z' fill='none' stroke='%23a8a29e' stroke-width='4'/><path d='M45 20l-15 25 20 45 20-45-15-25' fill='none' stroke='%23a8a29e' stroke-width='4'/><path d='M10 45h80' fill='none' stroke='%23a8a29e' stroke-width='4'/></svg>">
    <title>CityGems — бриллианты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@200;400&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #0d0d0d; color: #a8a29e; margin: 0; }
        h1, .serif { font-family: 'Cormorant Garamond', serif; }    
        .diamond-gradient { background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%); }
        .btn-shine { position: relative; overflow: hidden; }
        .btn-shine::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg); transition: 0.8s; opacity: 0; }
        .btn-shine:hover::after { left: 120%; opacity: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .mobile-btn { @apply flex items-center justify-between w-full p-5 border border-stone-900 bg-stone-900/20 hover:bg-stone-900/50 transition-all mb-3; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden text-center">

    <div class="absolute inset-0 diamond-gradient pointer-events-none"></div>

    <main class="max-w-xl w-full z-10 relative">
        <div class="mb-12 sm:mb-16">
            <h1 class="text-5xl md:text-7xl font-light tracking-[0.15em] text-white uppercase mb-4">
                City<span class="serif italic text-stone-500 lowercase">Gems</span>
            </h1>
            <div class="w-12 h-[1px] bg-stone-700 mx-auto mb-6"></div>
            <p class="serif text-xl md:text-2xl text-stone-400 font-light tracking-widest italic leading-snug">
                Камни,<br>которые рассказывают истории
            </p>
        </div>

        <div class="space-y-4 mb-16 sm:mb-20">
            <p class="text-[10px] uppercase tracking-[0.6em] text-stone-600 font-medium">Скоро открытие</p>
            <p class="text-stone-400 font-light leading-relaxed max-w-xs mx-auto text-sm">
                Мы работаем над созданием закрытой онлайн-витрины. Сейчас коллекция доступна только по частному запросу.
            </p>
        </div>

        <button onclick="openModal()" class="btn-shine group px-14 py-4 border border-stone-800 rounded-none hover:border-stone-400 transition-all duration-1000 bg-transparent">
            <span class="text-[11px] uppercase tracking-[0.3em] text-stone-200">Связаться с нами</span>
        </button>
    </main>

    <footer class="fixed bottom-8 w-full pointer-events-none">
        <p class="text-[9px] uppercase tracking-[0.5em] text-stone-800 italic">Москва &nbsp;•&nbsp; 2026</p>
    </footer>

    <div id="qr-modal" onclick="closeModal()" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center backdrop-blur-md transition-all duration-500 opacity-0">
        <div class="bg-[#111] p-6 sm:p-8 border border-stone-800 text-center relative shadow-2xl max-w-sm w-full mx-4" onclick="event.stopPropagation()">
            
            <h3 id="modal-title" class="serif italic text-stone-200 mb-8 tracking-[0.2em] uppercase text-[10px]">Выберите канал связи</h3>
            
            <div id="desktop-ui" class="hidden">
                <div class="flex border-b border-stone-900 mb-8 overflow-x-auto no-scrollbar">
                    <button onclick="setTab('tg')" id="t-tg" class="flex-1 pb-3 text-[9px] uppercase tracking-wider transition-all">Telegram</button>
                    <button onclick="setTab('wa')" id="t-wa" class="flex-1 pb-3 text-[9px] uppercase tracking-wider transition-all">WhatsApp</button>
                    <button onclick="setTab('mx')" id="t-mx" class="flex-1 pb-3 text-[9px] uppercase tracking-wider transition-all">Max</button>
                    <button onclick="setTab('ml')" id="t-ml" class="flex-1 pb-3 text-[9px] uppercase tracking-wider transition-all">Email</button>
                </div>

                <div class="relative inline-block mx-auto mb-6">
                    <a id="qr-link" href="#" target="_blank" class="relative block bg-white p-4 transition-transform hover:scale-105 active:scale-95 duration-300">
                        <div id="qrcode"></div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white p-1 shadow-sm">
                            <div id="qr-icon"></div>
                        </div>
                    </a>
                    <p id="qr-hint" class="mt-4 text-[9px] text-stone-600 uppercase tracking-widest font-sans h-4"></p>
                </div>
            </div>

            <div id="mobile-ui" class="hidden space-y-3">
                <a id="m-tg" href="#" class="flex items-center justify-between w-full p-4 border border-stone-800 hover:border-stone-500 transition-all group">
                    <span class="text-[10px] uppercase tracking-widest text-stone-300">Telegram</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </a>
                <a id="m-wa" href="#" class="flex items-center justify-between w-full p-4 border border-stone-800 hover:border-stone-500 transition-all">
                    <span class="text-[10px] uppercase tracking-widest text-stone-300">WhatsApp</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-10.6 8.38 8.38 0 013.8.9L21 3.5l-1.9 4.7z"/></svg>
                </a>
                <a id="m-mx" href="#" class="flex items-center justify-between w-full p-4 border border-stone-800 hover:border-stone-500 transition-all">
                    <span class="text-[10px] uppercase tracking-widest text-stone-300">Мессенджер Max</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </a>
                <button id="m-ml" onclick="copyEmail()" class="flex items-center justify-between w-full p-4 border border-stone-800 hover:border-stone-500 transition-all">
                    <span id="copy-text" class="text-[10px] uppercase tracking-widest text-stone-300">Скопировать Email</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
                </button>
            </div>

            <button onclick="closeModal()" class="block w-full text-[9px] uppercase tracking-[0.5em] text-stone-800 hover:text-stone-400 transition-colors font-sans pt-6">Назад</button>
        </div>
    </div>

    <script>
        const vault = {
            t: "ZmFuY3lkaWFtcw==", // Telegram
            w: "Nzk4NTc3NzY2NTU=", // WhatsApp
            x: "ZmFuY3lkaWFtcw==", // Max
            m: "aXJpbmE=", d: "Y2l0eWdlbXMucnU="
        };

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        function openModal() {
            const m = document.getElementById('qr-modal');
            const dUI = document.getElementById('desktop-ui');
            const mUI = document.getElementById('mobile-ui');
            
            m.classList.remove('hidden');
            
            if (isMobile) {
                mUI.classList.remove('hidden');
                dUI.classList.add('hidden');
                setupMobileLinks();
            } else {
                dUI.classList.remove('hidden');
                mUI.classList.add('hidden');
                setTab('tg');
            }
            
            setTimeout(() => m.style.opacity = "1", 10);
        }

        function setupMobileLinks() {
            document.getElementById('m-tg').href = `tg://resolve?domain=${atob(vault.t)}`;
            document.getElementById('m-wa').href = `whatsapp://send?phone=${atob(vault.w)}`;
            document.getElementById('m-mx').href = `https://tamtam.chat/${atob(vault.x)}`;
        }

        function copyEmail() {
            const email = `${atob(vault.m)}@${atob(vault.d)}`;
            const btnText = document.getElementById('copy-text');
            navigator.clipboard.writeText(email).then(() => {
                btnText.innerText = "Адрес скопирован!";
                setTimeout(() => btnText.innerText = "Скопировать Email", 2000);
            });
        }

        function setTab(tab) {
            const qrContainer = document.getElementById('qrcode');
            const icon = document.getElementById('qr-icon');
            const hint = document.getElementById('qr-hint');
            const link = document.getElementById('qr-link');
            qrContainer.innerHTML = "";
            let target = "", hintText = "", iconSvg = "";

            const active = "flex-1 pb-3 text-[9px] uppercase text-stone-200 border-b-2 border-stone-400 font-bold transition-all";
            const inactive = "flex-1 pb-3 text-[9px] uppercase text-stone-600 border-b-2 border-transparent transition-all";

            ['tg', 'wa', 'mx', 'ml'].forEach(t => {
                document.getElementById('t-' + t).className = (tab === t) ? active : inactive;
            });

            if (tab === 'tg') {
                target = `tg://resolve?domain=${atob(vault.t)}`;
                hintText = "Открыть чат в Telegram";
                iconSvg = `<rect width="24" height="24" rx="4" fill="#24A1DE"/><path d="M5.4 12L17.5 7.3c.6-.2 1.1.2.9 1l-2 9.7c-.2.7-.6.9-1.2.6l-3.1-2.3-1.5 1.5c-.2.2-.3.3-.6.3l.2-3.2 5.8-5.2c.3-.3-.1-.4-.4-.2l-7.2 4.5-3.1-1c-.7-.2-.7-.7.1-1z" fill="white"/>`;
            } else if (tab === 'wa') {
                target = `https://wa.me/${atob(vault.w)}`;
                hintText = "Написать в WhatsApp";
                iconSvg = `<rect width="24" height="24" rx="4" fill="#25D366"/><path d="M12.1 3c-4.9 0-9 4.1-9 9 0 1.6.4 3.1 1.2 4.4L3 21l4.7-1.2c1.3.7 2.8 1.1 4.4 1.1 4.9 0 9-4.1 9-9s-4.1-9-9-9zm4.3 12.5c-.2.6-1.1 1.1-1.5 1.2-.4.1-.9.2-2.6-.5-2.1-.8-3.4-3-3.5-3.2s-.8-1.1-.8-2.1c0-1 .5-1.5.7-1.7.2-.2.4-.3.6-.3h.4c.1 0 .3 0 .5.4.2.5.7 1.7.7 1.9s0 .4-.1.6c-.1.2-.2.3-.4.5s-.2.2-.1.4c.2.3.6.9 1.2 1.4.7.6 1.3.8 1.5.9.2.1.4.1.5-.1s.6-.8.8-1.1c.2-.3.4-.2.6-.1s1.3.6 1.5.7.4.2.5.3c.1.2.1.8-.1 1.4z" fill="white"/>`;
            } else if (tab === 'mx') {
                target = `https://tamtam.chat/${atob(vault.x)}`;
                hintText = "Написать в Max";
                iconSvg = `<rect width="24" height="24" rx="4" fill="#F2720C"/><path d="M12 4c-4.4 0-8 3.6-8 8s3.6 8 8 8 8-3.6 8-8-3.6-8-8-8zm4 11l-3-2v3l-4-4 4-4v3l3-2v6z" fill="white"/>`;
            } else if (tab === 'ml') {
                const email = `${atob(vault.m)}@${atob(vault.d)}`;
                target = `mailto:${email}`;
                hintText = "Кликните для копирования";
                iconSvg = `<rect width="24" height="24" rx="4" fill="#78716c"/><path d="M4 8l8 5 8-5v10H4V8zm0-2h16a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2zm1.5 2L12 12.5 18.5 8" stroke="white" stroke-width="1.2" fill="none"/>`;
                link.onclick = (e) => { e.preventDefault(); copyEmailDesktop(email, hint); };
            }

            if (tab !== 'ml') link.onclick = null;
            link.href = target;
            icon.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none">${iconSvg}</svg>`;
            hint.innerText = hintText;

            new QRCode(qrContainer, { text: target, width: 200, height: 200, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
        }

        function copyEmailDesktop(email, hintEl) {
            navigator.clipboard.writeText(email).then(() => {
                const old = hintEl.innerText;
                hintEl.innerText = "Адрес скопирован!";
                setTimeout(() => hintEl.innerText = old, 2000);
            });
        }

        function closeModal() {
            const m = document.getElementById('qr-modal');
            m.style.opacity = "0";
            setTimeout(() => m.classList.add('hidden'), 500);
        }
    </script>
</body>
</html>

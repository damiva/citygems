<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <!-- Подключаем Tailwind для быстрой стилизации -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="text-center px-4">
        <!-- Декоративный элемент (светящийся круг на фоне) -->
        <div class="absolute inset-0 overflow-hidden -z-10">
            <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-blue-500/10 blur-[120px]"></div>
            <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-purple-500/10 blur-[120px]"></div>
        </div>

        <!-- Основной текст -->
        <h1 class="text-5xl md:text-7xl font-light tracking-tighter text-white opacity-90 mb-4">
            under<span class="font-semibold text-blue-400">construction</span>
        </h1>
        
        <!-- Разделитель -->
        <div class="w-12 h-[1px] bg-slate-500 mx-auto mb-6"></div>
        
        <p class="text-slate-400 text-sm md:text-base uppercase tracking-[0.3em] font-light">
            Coming Soon
        </p>
    </div>

</body>
</html>

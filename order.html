<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityGems заказ</title>
  <script src="js/gems.js"></script>
  <script src="js/city.js"></script>
  <style>
    .user th { display: none; }
    .miss > * { background-color: lightpink;}
    body { font-family: Arial, Helvetica, sans-serif; }
    table { border-collapse: collapse; }
    td, th { border: 1px dotted black; padding: 5px; text-align: center; }
    th, td:first-child, td:last-of-type, td:nth-last-of-type(2) {text-align: right;}
    th:first-of-type {border-left: double;}
    thead > tr:not(:last-child) > * { border-top: none; border-left: none; border-bottom: none; }
    thead > tr:last-child, tfoot { background-color: #C5A059;}
    #head { font-size: xx-large; text-align: left; border: none; padding: 10px;}
    tbody tr:nth-child(even) { background-color: #FAF9F5; }
    tbody tr:hover { background-color: antiquewhite; }
  </style>
</head>
<body>
    <table class="user">
        <thead>
            <tr><td rowspan="2" id="head"><img src="favicon.ico" style="height:1lh; vertical-align: bottom;"> Заказ:</td></tr>
            <tr></tr>
            <tr></tr>
        </thead>
        <tbody></tbody>
        <tfoot><tr></tr></tfoot>
    </table>

    <script type="module">        
        function $(p, ...e) {
            if (typeof p == "string") p = document.querySelector(p);
            if (!e.length) return p;
            let t = p.tagName.toLowerCase() === "tr" ? "td" : "tr";
            let r = null;
            e.forEach(v => {
                if (typeof v == "boolean") t = v ? "th" : "td";
                else {
                    r = p.appendChild(document.createElement(t));
                    if(v !== undefined && v !== null) r.innerHTML = v;
                }
            });
            return r;
        }

        try {
            const [gems, city] = await Promise.all([window.gemsPromise, window.cityPromise]);
            const cart = Cart.parseURL(window.location.href);
            if (!cart.ids.length) throw new Error("Заказ пустой!")

            $("table").classList.toggle("user", !city.isAuthorized);
            $("img").addEventListener("dblclick", async () => {
                if (await city.check()) $("table").classList.toggle("user"); 
            });
            
            const cols = ["id", "lab", "shape", "weight", "color", "clarity", "cut", "polish", "symmetry", "Размеры", "Количество", "price"];
            $("#head").colSpan = cols.length - 1;
            $("thead > tr:first-child", true, "Дата:", new Date(cart.date).toLocaleDateString(), new Date(gems.date).toLocaleDateString());
            $("thead > tr:nth-child(2)", true, "Курс:", cart.rate, gems.rate, Math.round(((cart.rate || gems.rate) - gems.rate) * 10000) / 10000);
            $("thead > tr:last-child", "№", ...cols.map(c => gems.columns[c]?.title || c), true, "Цена ₽", "Разница ₽", "Цена $");

            let cnt = 0, sum = 0, rub = 0, usd = 0;
            let t = $("tbody");
            gems.getIDs(...cart.ids).forEach((ig, ic) => {
                const r = $(t, null);
                const q = cart.qts[ic];
                $(r, ic + 1);                
                if (ig < 0 || ig === undefined) {
                    $(r, cart.ids[ic], `Камень не найден в базе`).colSpan = cols.length - 3;
                    $(r, q, "-", true, "-", "-")
                    r.classList.add("miss");
                } else {
                    const i = gems.getItem(ig);
                    const p = cart.date && cart.rate && gems.rate && (Math.round(cart.rate / gems.rate * i.price / 10) * 10) || i.price;
                    const d = Math.round(i.price / gems.rate)
                    $(r, ...cols.map(k => 
                        k == "Размеры" ? [i.size1, i.size2, i.size3].join(" &times; ") :
                        k == "Количество" ? q :
                        k == "price" ? p.toLocaleString() : 
                        i[k]
                    ), true, i.price.toLocaleString(), (p - i.price).toLocaleString(), d.toLocaleString());
                    cnt += q;
                    sum += p * q;
                    rub += i.price * q;
                    usd += d * q;
                }
            });
            
            t = $("tfoot > tr");
            $(t, "Итого:").colSpan = cols.length - 1;
            $(t, cnt.toLocaleString(), sum.toLocaleString(), true, cur.toLocaleString(), (sum - cur).toLocaleString(), usd.toLocaleString());

        } catch(e) { 
            document.body.innerHTML = `<h1 style="color:red">Ошибка: ${e.message}</h1>`;
            console.error(e);
        }
    </script>
</body>
</html>

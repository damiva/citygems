<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityGems — Просмотр заказа</title>
  <script src="js/gems.js"></script>
  <style>
    body    { font-family: Arial, Helvetica, sans-serif; margin: 10px; }
    table   { border-collapse: collapse; width: 100%; max-width: 900px; margin: 0 auto; }
    caption { font-size: x-large; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 10px; text-align: left; }
    thead th{ font-weight: normal; font-style: italic; border-bottom: 1px solid black; }
    th, td  { padding: 8px; }
    tbody>* { border: 1px solid #ccc; }
    td      { text-align: right; }
    th      { font-weight: normal; text-align: center; }
    tfoot th{ text-align: right; border-top: 1px double black; }
    img,svg { height: 1em; vertical-align: middle; }
  </style>
</head>
<body>
    <table>
        <caption>
            <img src="favicon.ico" alt="CityGems" onerror="this.style.display='none';">
            Заказ <span id="order-date"></span>
            <a id="xls" href="#" download="citygems_order.xls" title="Экспорт в XLS" style="float:right">
                <svg viewBox="0 0 421 511.6" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#6DBF39" d="M95.7 0h199.1L421 136.5v317.6c0 31.5-26 57.5-57.5 57.5H95.7C64.2 511.6 38.2 485.7 38.2 454.1V57.5C38.2 25.9 64.1 0 95.7 0z"/>
                    <path fill="#589B2E" d="M341 133.4h-.1L421 188.8v-52.1h-54.4c-9.4-.1-18-1.2-25.6-3.3z"/>
                    <path fill="#DFFACD" d="M294.8 0L421 136.5v.2h-54.4c-45-.7-69.3-23.4-71.8-61.4V0z"/>
                    <path fill="#4F8C29" d="M0 431.9V253.4l.1-1.3c.6-16.4 14.3-29.7 30.9-29.7h7.2v50.6H381.1c12.9 0 23.4 10.5 23.4 23.4v135.5c0 12.8-10.5 23.4-23.4 23.4H23.4C10.5 455.3 0 444.8 0 431.9z"/>
                    <path fill="#4F8C29" d="M143.4 240.4a8.5 8.5 0 01-8.5-8.5 8.5 8.5 0 018.5-8.5h163.2a8.5 8.5 0 018.5 8.5 8.5 8.5 0 01-8.5 8.5H143.4zm0-59.2a8.5 8.5 0 010-17h172.3a8.5 8.5 0 110 17H143.4z"/>
                    <path fill="#fff" d="M11.3 276.2V431c0 7.8 6.4 14.2 14.2 14.2h354.7c7.8 0 14.2-6.4 14.2-14.2V297.4c0-7.8-6.4-14.2-14.2-14.2H37.9c-12.6-.1-19.6-1.6-26.6-7z"/>
                    <path fill="#1A1A1A" d="M125.9 319.7l9 21.9h1.3l9-21.9h28.5l-18.2 39.6 18.2 42.3h-29.1l-9.8-23.6h-1.2l-9.7 23.6H96.1l17.8-41.5-17.8-40.4h29.8zm108.7 81.9h-52.4v-81.9h26.2v60.9H234.6v21zm5.9-1.4l3.7-21.6c8 2 15.2 3 21.7 3 6.4 0 11.6-.3 15.5-.8v-6.6l-11.8-1c-10.6-1-18-3.5-21.9-7.7-4-4.1-6-10.3-6-18.4 0-11.2 2.4-18.9 7.3-23.1 4.8-4.2 13.1-6.3 24.7-6.3s22.1 1.1 31.4 3.3l-3.3 21c-8.1-1.3-14.6-2-19.5-2-4.9 0-9 .2-12.4.7v6.4l9.4.9c11.4 1.1 19.3 3.9 23.7 8.2 4.4 4.3 6.6 10.3 6.6 18 0 5.5-.7 10.2-2.2 14-1.5 3.8-3.3 6.7-5.3 8.6-2.1 2-5 3.5-8.7 4.5-3.8 1-7.1 1.7-9.9 1.9-2.8.2-6.6.3-11.3.3-11.4 0-21.9-1.1-31.6-3.4z"/>
                </svg>
            </a>
        </caption>
        <thead><tr></tr></thead>
        <tbody></tbody>
        <tfoot><tr></tr></tfoot>
    </table>

    <script>
        const cols = ["id", "lab", "shape", "weight", "cut", "polish", "symmetry", "sizes", "price"];
        function $(parent, tag, ...html) {
            if (typeof parent === "string") parent = document.querySelector(parent);
            if (tag === undefined) return parent;
            if (!html.length) return parent.appendChild(document.createElement(tag));
            let last = null;
            html.forEach(v => {
                last = parent.appendChild(document.createElement(tag));
                if (v) last.innerHTML = v;
            });
            return last;
        }
        function render(gems, cart) {
            $("thead>tr", "th", "п/п", ...cols.map(k => gems[k]?.title || k), "Кол-во", "Сумма");
            const tbody = $("tbody");
            let sum = 0, qts = 0;
            cart.items.forEach((item, idx) => {
                const rowSum = Number(item.price || 0) * item.qty;
                sum += rowSum;
                qts += item.qty;
                const tr = $(tbody, null);
                $(tr, "td", idx + 1);
                cols.forEach(k => {
                    let v = item[k], t = "th";
                    switch (k) {
                        case "weigth": v = v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                        case "price": t = "td";
                    }
                    $(tr, t, v);
                });
                $(tr, "td", item.qty, rowSum);
            });
            const tFoot = $("tfoot>tr");
            $(tFoot, "td", "Итого:").colSpan = cols.length + 1;
            $(tFoot, "td", qts, sum);
            $("#xls").href = URL.createObjectURL(cart.xls);
        }
        Gems.loadGems("https://citygems.ru/db/gems.json", 1).then(gems => {
            const cart = new Cart(gems, window.location.href);
            if (!cart.count) throw new Error("Заказ пуст или содержит поврежденные параметры!");
            else render(gems, cart);
        }).catch(e => {
            console.error(e);
            document.body.innerHTML = `<main style="text-align: center; padding-top: 15%;"><h2 style="color: red;">Ошибка загрузки заказа</h2><p>${e.message}</p></main>`;
        });
    </script>
</body>
</html>

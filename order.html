<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityGems — Просмотр заказа</title>
  
  <!-- Премиальные шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap">
  
  <script src="js/gems.js"></script>
  <style>
    /* --- ДИЗАЙН-ТОКЕНЫ --- */
    :root {
      --color-bg: #FFFFFF;
      --color-bg-secondary: #FAF9F5;
      --color-primary: #1C1C1C;
      --color-secondary: #707070;
      --color-accent: #C5A880; /* Благородное золото */
      --color-border: #EAE6DF;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Montserrat', sans-serif;
    }

    /* --- БАЗОВЫЕ СТИЛИ --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-bg);
      color: var(--color-primary);
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      padding: 2rem;
    }

    /* --- ТАБЛИЦА --- */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    caption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--color-primary);
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }

    caption .caption-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    caption .logo-img {
      height: 36px;
      width: auto;
    }

    caption .title-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    caption .date-subtext {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      color: var(--color-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
    }

    caption .export-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    caption .export-btn:hover {
      border-color: var(--color-accent);
      background-color: var(--color-bg-secondary);
      transform: translateY(-2px);
    }

    caption .export-icon {
      width: 24px;
      height: 24px;
    }

    /* Ячейки заголовков */
    thead th {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-secondary);
      border-bottom: 1px solid var(--color-primary);
      padding: 1rem 0.5rem;
      text-align: center;
    }

    thead th.num-col {
      text-align: right;
    }

    /* Ячейки тела таблицы */
    tbody tr {
      border-bottom: 1px solid var(--color-border);
      transition: background-color 0.2s ease;
    }

    tbody tr:hover {
      background-color: var(--color-bg-secondary);
    }

    tbody td {
      padding: 1rem 0.5rem;
      font-size: 0.85rem;
      color: var(--color-primary);
      text-align: center;
    }

    tbody td.num-col {
      text-align: right;
      font-weight: 500;
    }

    tbody td.row-num {
      color: var(--color-secondary);
      font-size: 0.8rem;
    }

    /* Ячейки подвала (Итого) */
    tfoot th {
      padding: 1.25rem 0.5rem;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      border-top: 2px solid var(--color-primary);
      text-align: right;
    }

    tfoot th.total-label {
      text-align: left;
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 400;
    }

    tfoot th.total-price {
      color: var(--color-accent);
      font-size: 1.1rem;
    }

    /* Системные сообщения */
    .error-msg {
      text-align: center;
      padding: 4rem 1rem;
    }

    .error-msg h2 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      color: #EF4444;
      margin-bottom: 1rem;
    }

    .error-msg p {
      color: var(--color-secondary);
    }
  </style>
</head>
<body>
    <div class="container">
        <table>
            <caption>
                <div class="caption-left">
                    <img src="favicon.ico" class="logo-img" alt="CityGems" onerror="this.style.display='none';">
                    <div class="title-text">
                        <span>Заказ</span>
                        <span id="order-date" class="date-subtext"></span>
                    </div>
                </div>
                <a id="xls-download" href="#" download="citygems_order.xls" title="Экспорт в Excel" class="export-btn">
                    <!-- Премиальная векторная SVG иконка Excel -->
                    <svg class="export-icon" viewBox="0 0 421 511.6" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#6DBF39" d="M95.7 0h199.1L421 136.5v317.6c0 31.5-26 57.5-57.5 57.5H95.7C64.2 511.6 38.2 485.7 38.2 454.1V57.5C38.2 25.9 64.1 0 95.7 0z"/>
                        <path fill="#589B2E" d="M341 133.4h-.1L421 188.8v-52.1h-54.4c-9.4-.1-18-1.2-25.6-3.3z"/>
                        <path fill="#DFFACD" d="M294.8 0L421 136.5v.2h-54.4c-45-.7-69.3-23.4-71.8-61.4V0z"/>
                        <path fill="#4F8C29" d="M0 431.9V253.4l.1-1.3c.6-16.4 14.3-29.7 30.9-29.7h7.2v50.6H381.1c12.9 0 23.4 10.5 23.4 23.4v135.5c0 12.8-10.5 23.4-23.4 23.4H23.4C10.5 455.3 0 444.8 0 431.9z"/>
                        <path fill="#4F8C29" d="M143.4 240.4a8.5 8.5 0 01-8.5-8.5 8.5 8.5 0 018.5-8.5h163.2a8.5 8.5 0 018.5 8.5 8.5 8.5 0 01-8.5 8.5H143.4zm0-59.2a8.5 8.5 0 010-17h172.3a8.5 8.5 0 110 17H143.4z"/>
                        <path fill="#fff" d="M11.3 276.2V431c0 7.8 6.4 14.2 14.2 14.2h354.7c7.8 0 14.2-6.4 14.2-14.2V297.4c0-7.8-6.4-14.2-14.2-14.2H37.9c-12.6-.1-19.6-1.6-26.6-7z"/>
                        <path fill="#1A1A1A" d="M125.9 319.7l9 21.9h1.3l9-21.9h28.5l-18.2 39.6 18.2 42.3h-29.1l-9.8-23.6h-1.2l-9.7 23.6H96.1l17.8-41.5-17.8-40.4h29.8zm108.7 81.9h-52.4v-81.9h26.2v60.9H234.6v21zm5.9-1.4l3.7-21.6c8 2 15.2 3 21.7 3 6.4 0 11.6-.3 15.5-.8v-6.6l-11.8-1c-10.6-1-18-3.5-21.9-7.7-4-4.1-6-10.3-6-18.4 0-11.2 2.4-18.9 7.3-23.1 4.8-4.2 13.1-6.3 24.7-6.3s22.1 1.1 31.4 3.3l-3.3 21c-8.1-1.3-14.6-2-19.5-2-4.9 0-9 .2-12.4.7v6.4l9.4.9c11.4 1.1 19.3 3.9 23.7 8.2 4.4 4.3 6.6 10.3 6.6 18 0 5.5-.7 10.2-2.2 14-1.5 3.8-3.3 6.7-5.3 8.6-2.1 2-5 3.5-8.7 4.5-3.8 1-7.1 1.7-9.9 1.9-2.8.2-6.6.3-11.3.3-11.4 0-21.9-1.1-31.6-3.4z"/>
                    </svg>
                </a>
            </caption>
            <thead><tr></tr></thead>
            <tbody></tbody>
            <tfoot><tr></tr></tfoot>
        </table>
    </div>

    <script>
        const cols = ["id", "lab", "shape", "weight", "cut", "polish", "symmetry", "sizes", "price"];

        // Наша чистая декларативная стейт-машина отрисовки таблицы
        function $(parent, ...elements) {
            if (typeof parent === "string") parent = document.querySelector(parent);
            if (!elements.length) return parent;

            let isHeaderRow = parent.tagName.toLowerCase() === "tr" && parent.parentNode?.tagName.toLowerCase() === "thead";
            let defaultTag = isHeaderRow ? "th" : "td";
            let createdElement = null;

            elements.forEach(v => {
                if (typeof v === "boolean") {
                    defaultTag = v ? "th" : "td";
                } else {
                    createdElement = parent.appendChild(document.createElement(defaultTag));
                    if (v !== undefined && v !== null) {
                        createdElement.textContent = v.toString();
                    }
                }
            });
            return createdElement;
        }

        function render(gems, cart) {
            const theadTr = $("thead>tr");
            
            // Отрисовываем шапку таблицы
            $(theadTr, true, "п/п"); // Номер строки в th
            cols.forEach(k => {
                const th = $(theadTr, true, gems[k]?.title || k);
                if (gems[k]?.isNum) th.className = "num-col";
            });
            $(theadTr, true, "Кол-во", "Сумма");

            const tbody = $("tbody");
            let sum = 0, qts = 0;

            // Выводим строки данных
            cart.items.forEach((item, idx) => {
                const rowSum = Number(item.price || 0) * item.qty;
                sum += rowSum;
                qts += item.qty;

                const tr = $(tbody, null);
                
                // Заполняем номер строки
                const numTd = $(tr, idx + 1);
                numTd.className = "row-num";

                // Заполняем характеристики
                cols.forEach(k => {
                    const td = $(tr, item[k]);
                    if (gems[k]?.isNum) {
                        td.className = "num-col";
                        const dec = k === "weight" ? 2 : 0;
                        td.textContent = Number(item[k]).toLocaleString("ru-RU", { 
                            minimumFractionDigits: dec, 
                            maximumFractionDigits: dec 
                        });
                    }
                });

                // Выводим количество и итоговую сумму строки
                const qtyTd = $(tr, item.qty);
                qtyTd.className = "num-col";
                
                const sumTd = $(tr, rowSum.toLocaleString("ru-RU"));
                sumTd.className = "num-col";
            });

            // Отрисовываем итоговую строку (tfoot)
            const tfootTr = $("tfoot>tr");
            const labelTh = $(tfootTr, true, "Итого:");
            labelTh.colSpan = cols.length + 1;
            labelTh.className = "total-label";

            const totalQtyTh = $(tfootTr, true, qts);
            totalQtyTh.className = "num-col";

            const totalPriceTh = $(tfootTr, true, `${sum.toLocaleString("ru-RU")} ₽`);
            totalPriceTh.className = "num-col total-price";

            // Навешиваем динамическую генерацию XML Excel на кнопку
            const xlsLink = document.getElementById("xls-download");
            if (xlsLink) {
                xlsLink.href = URL.createObjectURL(cart.xls);
            }
        }

        // Загрузка СУБД Gems в техническом режиме (rate = 1, чтобы не накладывать повторный курс на цену)
        Gems.loadGems("https://citygems.ru/db/gems.json", 1).then(gems => {
            const cart = new Cart(gems, window.location.href);
            if (!cart.count) throw new Error("Заказ пуст или содержит поврежденные параметры!");

            if (gems.date) {
                const d = new Date(gems.date);
                document.getElementById("order-date").textContent = `от ${d.toLocaleDateString("ru-RU")}`;
            }

            render(gems, cart);
        }).catch(e => {
            document.body.innerHTML = `
                <div class="error-msg">
                    <h2>Ошибка загрузки заказа</h2>
                    <p>${e.message}</p>
                </div>`;
        });
    </script>
</body>
</html>
